<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Packliste</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --scale: 1;
    --ink:#241f2e;
    --muted:#8b8496;
    --muted-light:#a9a3b5;
    --accent1:#7b6cf0;
    --accent2:#ef7ba0;
    --accent3:#5ad1c8;
    --done:#3ecf8e;
    --danger:#f0577b;
    --glass-bg: rgba(255,255,255,0.55);
    --glass-bg-strong: rgba(255,255,255,0.72);
    --glass-border: rgba(255,255,255,0.6);
    --glass-shadow: 0 8px 32px rgba(90,60,150,0.14);
    --field-bg: rgba(255,255,255,0.75);
    --btn-secondary-bg: rgba(255,255,255,0.7);
    --btn-secondary-bg-hover: rgba(255,255,255,0.92);
    --chip-bg: rgba(139,132,150,0.12);
    --divider: rgba(139,132,150,0.14);
    --page-bg:
      radial-gradient(circle at 12% 8%, rgba(123,108,240,0.35), transparent 45%),
      radial-gradient(circle at 88% 15%, rgba(239,123,160,0.32), transparent 42%),
      radial-gradient(circle at 20% 90%, rgba(90,209,200,0.30), transparent 45%),
      radial-gradient(circle at 90% 85%, rgba(255,205,120,0.28), transparent 40%),
      linear-gradient(160deg, #f4f1fb 0%, #f7f0f5 45%, #eef8f6 100%);
  }
  html[data-theme="dark"]{
    --ink:#f1eef8;
    --muted:#aca6c4;
    --muted-light:#8f8aa8;
    --glass-bg: rgba(34,28,54,0.55);
    --glass-bg-strong: rgba(34,28,54,0.78);
    --glass-border: rgba(255,255,255,0.10);
    --glass-shadow: 0 8px 32px rgba(0,0,0,0.5);
    --field-bg: rgba(255,255,255,0.07);
    --btn-secondary-bg: rgba(255,255,255,0.08);
    --btn-secondary-bg-hover: rgba(255,255,255,0.15);
    --chip-bg: rgba(255,255,255,0.08);
    --divider: rgba(255,255,255,0.10);
    --page-bg:
      radial-gradient(circle at 12% 8%, rgba(123,108,240,0.28), transparent 45%),
      radial-gradient(circle at 88% 15%, rgba(239,123,160,0.22), transparent 42%),
      radial-gradient(circle at 20% 90%, rgba(90,209,200,0.20), transparent 45%),
      radial-gradient(circle at 90% 85%, rgba(255,205,120,0.16), transparent 40%),
      linear-gradient(160deg, #14101f 0%, #1a1428 45%, #101a1c 100%);
  }
  *{box-sizing:border-box;}
  html{font-size:calc(16px * var(--scale)); scroll-behavior:smooth;}
  body{
    margin:0;
    min-height:100vh;
    font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    color:var(--ink);
    padding:1.25rem 1rem 5rem;
    background:var(--page-bg);
    background-attachment: fixed;
    position:relative;
    transition:background .3s ease, color .3s ease;
  }
  .wrap{max-width:44rem;margin:0 auto;position:relative;z-index:1;}

  .glass{
    background:var(--glass-bg);
    backdrop-filter: blur(18px) saturate(160%);
    -webkit-backdrop-filter: blur(18px) saturate(160%);
    border:1px solid var(--glass-border);
    border-radius:1.4rem;
    box-shadow:var(--glass-shadow);
    transition:background .3s ease, border-color .3s ease;
  }

  header.glass{
    padding:1.3rem 1.4rem;
    margin-bottom:1rem;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:0.75rem;
    flex-wrap:wrap;
  }
  .title-block h1{
    font-family:'Outfit',sans-serif;
    font-size:1.7rem;
    font-weight:700;
    margin:0 0 0.2rem;
    background:linear-gradient(100deg, var(--accent1), var(--accent2) 60%, var(--accent3));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    letter-spacing:-0.01em;
  }
  .sub{color:var(--muted);font-size:0.9rem;margin:0;}
  .status{font-size:0.78rem;color:var(--muted);margin-top:0.5rem;display:flex;align-items:center;gap:0.4rem;}
  .status .dot{width:0.5rem;height:0.5rem;border-radius:50%;background:var(--danger);flex-shrink:0;}
  .status.live .dot{background:var(--done);box-shadow:0 0 0 0 rgba(62,207,142,0.6);animation:pulse 2s infinite;}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(62,207,142,0.55);}
    70%{box-shadow:0 0 0 7px rgba(62,207,142,0);}
    100%{box-shadow:0 0 0 0 rgba(62,207,142,0);}
  }

  .header-controls{display:flex;align-items:center;gap:0.5rem;flex-shrink:0;}

  .theme-toggle{
    all:unset;
    width:2.4rem;height:2.4rem;
    display:flex;align-items:center;justify-content:center;
    border-radius:999px;
    background:rgba(255,255,255,0.6);
    border:1px solid var(--glass-border);
    cursor:pointer;
    font-size:1.05rem;
    flex-shrink:0;
  }
  html[data-theme="dark"] .theme-toggle{background:rgba(255,255,255,0.08);}
  .theme-toggle:active{transform:scale(0.92);}

  .fontctl{
    display:flex;align-items:center;gap:0.3rem;
    background:rgba(255,255,255,0.6);
    border:1px solid var(--glass-border);
    border-radius:999px;
    padding:0.2rem;
    flex-shrink:0;
  }
  html[data-theme="dark"] .fontctl{background:rgba(255,255,255,0.08);}
  .fontctl button{
    all:unset;
    width:2rem;height:2rem;
    display:flex;align-items:center;justify-content:center;
    border-radius:999px;
    font-family:'Outfit',sans-serif;
    font-weight:700;
    color:var(--ink);
    cursor:pointer;
    font-size:1.05rem;
    line-height:1;
  }
  .fontctl button:active{background:rgba(123,108,240,0.25);}
  .fontctl-value{
    font-size:0.72rem;font-weight:600;color:var(--muted);
    min-width:2.4rem;text-align:center;cursor:pointer;
    user-select:none;
  }

  .toolbar{
    display:flex;flex-wrap:wrap;gap:0.5rem;align-items:center;
    padding:0.9rem;margin:0.9rem 0;
  }
  .toolbar label{font-size:0.8rem;color:var(--muted);margin-right:0.1rem;white-space:nowrap;}
  select, input[type=text]{
    font-family:'Inter',sans-serif;
    font-size:0.95rem;padding:0.6rem 0.7rem;
    border:1px solid var(--glass-border);
    border-radius:0.8rem;
    background:var(--field-bg);
    color:var(--ink);
    min-height:2.6rem;
  }
  select:focus, input[type=text]:focus{ outline:2px solid var(--accent1); outline-offset:1px;}
  select#listSelect{flex:1;min-width:9rem;}

  button{
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:0.86rem;padding:0.6rem 0.95rem;border:none;border-radius:0.8rem;
    background:linear-gradient(120deg, var(--accent1), var(--accent2));
    color:#fff;cursor:pointer;
    min-height:2.6rem;
    box-shadow:0 4px 14px rgba(123,108,240,0.28);
    transition:transform .12s ease, box-shadow .12s ease, background .2s ease;
  }
  button:hover{transform:translateY(-1px); box-shadow:0 6px 18px rgba(123,108,240,0.36);}
  button:active{transform:translateY(0);}
  button.secondary{background:var(--btn-secondary-bg);color:var(--ink);box-shadow:none;border:1px solid var(--glass-border);}
  button.secondary:hover{background:var(--btn-secondary-bg-hover); box-shadow:0 4px 12px rgba(90,60,150,0.12);}
  button.danger{background:linear-gradient(120deg, var(--danger), #e5486e); box-shadow:0 4px 14px rgba(240,87,123,0.3);}
  button.icon-btn{
    min-height:auto;width:2.1rem;height:2.1rem;padding:0;
    display:flex;align-items:center;justify-content:center;
    background:var(--btn-secondary-bg);color:var(--ink);box-shadow:none;
    border:1px solid var(--glass-border);font-size:0.85rem;flex-shrink:0;
  }
  button.icon-btn:hover{background:var(--btn-secondary-bg-hover);}
  button.icon-btn:disabled{opacity:0.3;}
  button:disabled{opacity:0.5;cursor:default;transform:none;}

  .share-row{
    display:flex;gap:0.5rem;align-items:center;margin:0.7rem 0;flex-wrap:wrap;
    padding:0.7rem 0.9rem;
  }
  .share-row input{flex:1;min-width:11rem;font-size:0.8rem;color:var(--muted);background:var(--field-bg);}

  .progress-card{padding:0.9rem 1.1rem;margin:0.9rem 0;}
  .progress-row{display:flex;align-items:center;gap:0.8rem;}
  .progress-bar{flex:1;height:0.7rem;background:var(--chip-bg);border-radius:999px;overflow:hidden;}
  .progress-fill{
    height:100%;
    background:linear-gradient(90deg, var(--accent3), var(--done));
    width:0%;
    border-radius:999px;
    transition:width .3s ease;
  }
  .progress-text{font-size:0.85rem;color:var(--muted);white-space:nowrap;font-weight:600;}

  .cat-toolbar{
    display:flex;align-items:center;justify-content:space-between;gap:0.5rem;
    padding:0.8rem 1rem;margin:1rem 0 0.9rem;
    flex-wrap:wrap;
  }
  .cat-toolbar span{font-size:0.85rem;color:var(--muted);}

  .category{
    margin-bottom:0.9rem;
    overflow:hidden;
    position:relative;
  }
  .category::before{
    content:"";
    position:absolute;
    left:0;top:0;bottom:0;
    width:0.28rem;
    background:linear-gradient(180deg, var(--accent1), var(--accent3));
  }
  .category:nth-of-type(2n)::before{background:linear-gradient(180deg, var(--accent2), var(--accent1));}
  .category:nth-of-type(3n)::before{background:linear-gradient(180deg, var(--accent3), var(--accent2));}

  .category-header{
    display:flex;justify-content:space-between;align-items:center;
    padding:0.8rem 1rem 0.8rem 1.3rem;
    flex-wrap:wrap;
    gap:0.5rem;
  }
  .category-header .title-row{display:flex;align-items:center;gap:0.6rem;flex:1;min-width:8rem;}
  .category-header h2{
    font-family:'Outfit',sans-serif;
    font-size:1.02rem;font-weight:600;margin:0;
  }
  .category-header .count{
    font-size:0.78rem;color:var(--muted);font-weight:600;
    background:var(--chip-bg);
    padding:0.2rem 0.55rem;
    border-radius:999px;
    flex-shrink:0;
  }
  .cat-actions{display:flex;gap:0.3rem;flex-shrink:0;}

  .items{padding:0 1.1rem 0.8rem 1.3rem;}
  .item{
    display:flex;align-items:center;gap:0.75rem;padding:0.65rem 0;
    border-bottom:1px solid var(--divider);
  }
  .item:last-child{border-bottom:none;}

  .item input[type=checkbox]{
    -webkit-appearance:none;appearance:none;
    width:1.4rem;height:1.4rem;flex-shrink:0;
    border-radius:50%;
    border:2px solid rgba(123,108,240,0.45);
    cursor:pointer;
    display:grid;place-content:center;
    transition:background .15s ease, border-color .15s ease, transform .1s ease;
  }
  .item input[type=checkbox]::before{
    content:"";
    width:0.6rem;height:0.6rem;
    border-radius:50%;
    transform:scale(0);
    transition:transform .15s ease;
    background:#fff;
  }
  .item input[type=checkbox]:checked{
    background:linear-gradient(120deg, var(--accent3), var(--done));
    border-color:transparent;
  }
  .item input[type=checkbox]:checked::before{transform:scale(1);}
  .item input[type=checkbox]:active{transform:scale(0.9);}

  .item span{flex:1;font-size:0.97rem;line-height:1.35;}
  .item.checked span{text-decoration:line-through;color:var(--muted-light);}
  .item .del{
    all:unset;cursor:pointer;color:var(--muted);
    width:1.8rem;height:1.8rem;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    border-radius:50%;font-size:1rem;
  }
  .item .del:hover{color:#fff;background:var(--danger);}
  .empty-cat{color:var(--muted);font-size:0.85rem;padding:0.4rem 0 0.8rem;font-style:italic;}

  .add-in-cat{
    display:flex;gap:0.5rem;align-items:center;
    margin-top:0.5rem;padding-top:0.6rem;
    border-top:1px dashed var(--divider);
  }
  .add-in-cat input[type=text]{
    flex:1;background:transparent;border:none;padding:0.4rem 0.1rem;
    min-height:auto;font-size:0.92rem;
  }
  .add-in-cat input[type=text]:focus{outline:none;}
  .add-in-cat button{
    min-height:auto;width:2rem;height:2rem;padding:0;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;
  }

  .footer-actions{display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:1.3rem;}
  .hint{font-size:0.78rem;color:var(--muted);margin-top:0.6rem;text-align:center;}

  @media (max-width: 30rem){
    header.glass{flex-direction:column;}
    .header-controls{align-self:flex-end;}
    .toolbar{flex-direction:column;align-items:stretch;}
    .toolbar label{margin-bottom:-0.2rem;}
    .toolbar select, .toolbar button{width:100%;}
  }

  @media print{
    .toolbar,.footer-actions,.share-row,.fontctl,.theme-toggle,.cat-toolbar,.cat-actions,.add-in-cat{display:none;}
    body{background:#fff;}
    .glass{background:#fff;box-shadow:none;backdrop-filter:none;}
    .category{break-inside:avoid;border:1px solid #ddd;}
  }
</style>

<body>
<div class="wrap">
  <header class="glass">
    <div class="title-block">
      <h1>🧳 Packliste</h1>
      <p class="sub">Abhaken, ergänzen, teilen — in Echtzeit für alle sichtbar.</p>
      <div class="status" id="statusLine"><span class="dot"></span><span class="statusText">Verbinde…</span></div>
    </div>
    <div class="header-controls">
      <button class="theme-toggle" id="themeToggle" aria-label="Darstellung umschalten">🌙</button>
      <div class="fontctl" title="Schriftgröße anpassen">
        <button id="fontSmaller" aria-label="Schrift verkleinern">−</button>
        <span class="fontctl-value" id="fontValue" title="Zurücksetzen">100%</span>
        <button id="fontBigger" aria-label="Schrift vergrößern">+</button>
      </div>
    </div>
  </header>

  <div class="toolbar glass">
    <label for="listSelect">Liste:</label>
    <select id="listSelect"></select>
    <button id="newListBtn" class="secondary">+ Neue Liste</button>
    <button id="renameListBtn" class="secondary">Umbenennen</button>
    <button id="duplicateListBtn" class="secondary">Duplizieren</button>
    <button id="deleteListBtn" class="danger">Löschen</button>
  </div>

  <div class="share-row glass">
    <input type="text" id="shareLink" readonly>
    <button id="copyLinkBtn" class="secondary">Link kopieren</button>
  </div>

  <div class="progress-card glass">
    <div class="progress-row">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">0 / 0</div>
    </div>
  </div>

  <div class="cat-toolbar glass">
    <span>Kategorien</span>
    <button id="newCategoryBtn" class="secondary">+ Kategorie</button>
  </div>

  <div id="categories"></div>

  <div class="footer-actions">
    <button class="secondary" id="resetChecksBtn">Alle Häkchen zurücksetzen</button>
    <button class="secondary" id="printBtn">Drucken / als PDF</button>
  </div>
  <div class="hint">Alle Änderungen werden live mit jedem geteilt, der diesen Link öffnet.</div>
</div>

<script>
(function(){
  var root = document.documentElement;

  // Font scale
  var SCALE_KEY = "packliste_fontscale";
  var MIN = 0.75, MAX = 1.8, STEP = 0.05;
  var scale = parseFloat(localStorage.getItem(SCALE_KEY)) || 1;
  var fontValueEl = document.getElementById("fontValue");
  function applyScale(){
    root.style.setProperty("--scale", scale.toFixed(2));
    fontValueEl.textContent = Math.round(scale * 100) + "%";
  }
  applyScale();
  document.getElementById("fontSmaller").addEventListener("click", function(){
    scale = Math.max(MIN, +(scale - STEP).toFixed(2));
    localStorage.setItem(SCALE_KEY, scale); applyScale();
  });
  document.getElementById("fontBigger").addEventListener("click", function(){
    scale = Math.min(MAX, +(scale + STEP).toFixed(2));
    localStorage.setItem(SCALE_KEY, scale); applyScale();
  });
  fontValueEl.addEventListener("click", function(){
    scale = 1; localStorage.setItem(SCALE_KEY, scale); applyScale();
  });

  // Theme
  var THEME_KEY = "packliste_theme";
  var stored = localStorage.getItem(THEME_KEY);
  var theme = stored || (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
  var themeBtn = document.getElementById("themeToggle");
  function applyTheme(){
    if(theme === "dark"){
      root.setAttribute("data-theme", "dark");
      themeBtn.textContent = "☀️";
    } else {
      root.removeAttribute("data-theme");
      themeBtn.textContent = "🌙";
    }
  }
  applyTheme();
  themeBtn.addEventListener("click", function(){
    theme = theme === "dark" ? "light" : "dark";
    localStorage.setItem(THEME_KEY, theme);
    applyTheme();
  });
})();
</script>

}

function renderListSelect(){
  listSelect.innerHTML = "";
  Object.keys(allLists).forEach(id=>{
    const opt = document.createElement("option");
    opt.value = id;
    opt.textContent = allLists[id].name || "(ohne Namen)";
    if(id === activeListId) opt.selected = true;
    listSelect.appendChild(opt);
  });
}

function escapeHtml(s){
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function currentOrder(){
  return (activeListData && activeListData.categoryOrder) || defaultCategoryOrder;
}

function renderCategories(){
  // Preserve focus/selection on an in-category "add item" input across live re-renders
  let focusedCat = null, focusedSelStart = null;
  const active = document.activeElement;
  if(active && active.dataset && active.dataset.addInputFor){
    focusedCat = active.dataset.addInputFor;
    focusedSelStart = active.selectionStart;
  }

  categoriesEl.innerHTML = "";
  if(!activeListData){ progressFill.style.width = "0%"; progressText.textContent = "0 / 0"; return; }

  const order = currentOrder();
  const categories = activeListData.categories || {};
  let total = 0, done = 0;

  order.forEach((cat, idx)=>{
    const itemsObj = categories[cat] || {};
    const entries = Object.entries(itemsObj);
    total += entries.length;
    done += entries.filter(([,it])=>it.checked).length;

    const catEl = document.createElement("div");
    catEl.className = "category glass";

    const header = document.createElement("div");
    header.className = "category-header";

    const titleRow = document.createElement("div");
    titleRow.className = "title-row";
    const h2 = document.createElement("h2");
    h2.textContent = cat;
    const count = document.createElement("span");
    count.className = "count";
    count.textContent = `${entries.filter(([,it])=>it.checked).length}/${entries.length}`;
    titleRow.appendChild(h2);
    titleRow.appendChild(count);
    header.appendChild(titleRow);

    const actions = document.createElement("div");
    actions.className = "cat-actions";

    const upBtn = document.createElement("button");
    upBtn.className = "icon-btn"; upBtn.title = "Nach oben"; upBtn.textContent = "↑";
    upBtn.disabled = idx === 0;
    upBtn.addEventListener("click", ()=> moveCategory(cat, -1));

    const downBtn = document.createElement("button");
    downBtn.className = "icon-btn"; downBtn.title = "Nach unten"; downBtn.textContent = "↓";
    downBtn.disabled = idx === order.length - 1;
    downBtn.addEventListener("click", ()=> moveCategory(cat, 1));

    const renameBtn = document.createElement("button");
    renameBtn.className = "icon-btn"; renameBtn.title = "Umbenennen"; renameBtn.textContent = "✎";
    renameBtn.addEventListener("click", ()=> renameCategory(cat));

    const deleteBtn = document.createElement("button");
    deleteBtn.className = "icon-btn"; deleteBtn.title = "Kategorie löschen"; deleteBtn.textContent = "🗑";
    deleteBtn.addEventListener("click", ()=> deleteCategory(cat));

    actions.appendChild(upBtn);
    actions.appendChild(downBtn);
    actions.appendChild(renameBtn);
    actions.appendChild(deleteBtn);
    header.appendChild(actions);

    catEl.appendChild(header);

    const itemsEl = document.createElement("div");
    itemsEl.className = "items";

    if(entries.length === 0){
      const empty = document.createElement("div");
      empty.className = "empty-cat";
      empty.textContent = "Noch keine Artikel in dieser Kategorie.";
      itemsEl.appendChild(empty);
    }

    entries.forEach(([itemId, item])=>{
      const row = document.createElement("div");
      row.className = "item" + (item.checked ? " checked" : "");

      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = !!item.checked;
      cb.addEventListener("change", ()=> toggleItem(cat, itemId, cb.checked));

      const span = document.createElement("span");
      span.textContent = item.text;

      const del = document.createElement("button");
      del.className = "del";
      del.textContent = "✕";
      del.title = "Entfernen";
      del.addEventListener("click", ()=> deleteItem(cat, itemId));

      row.appendChild(cb);
      row.appendChild(span);
      row.appendChild(del);
      itemsEl.appendChild(row);
    });

    // Inline "add item" row, scoped to this category
    const addRow = document.createElement("div");
    addRow.className = "add-in-cat";
    const addInput = document.createElement("input");
    addInput.type = "text";
    addInput.placeholder = "Artikel hinzufügen…";
    addInput.dataset.addInputFor = cat;
    addInput.value = draftInputs[cat] || "";
    addInput.addEventListener("input", ()=> { draftInputs[cat] = addInput.value; });
    const addBtn = document.createElement("button");
    addBtn.textContent = "+";
    addBtn.title = "Hinzufügen";
    function submit(){ addItemToCategory(cat, addInput); }
    addInput.addEventListener("keydown", (e)=>{ if(e.key === "Enter") submit(); });
    addBtn.addEventListener("click", submit);
    addRow.appendChild(addInput);
    addRow.appendChild(addBtn);
    itemsEl.appendChild(addRow);

    catEl.appendChild(itemsEl);
    categoriesEl.appendChild(catEl);
  });

  if(focusedCat){
    const el = categoriesEl.querySelector(`[data-add-input-for="${CSS.escape(focusedCat)}"]`);
    if(el){
      el.focus();
      if(focusedSelStart != null){
        try{ el.setSelectionRange(focusedSelStart, focusedSelStart); }catch(e){}
      }
    }
  }

  progressFill.style.width = total ? (done/total*100)+"%" : "0%";
  progressText.textContent = `${done} / ${total}`;
}

async function toggleItem(cat, itemId, checked){
  const ref = doc(db, "lists", activeListId);
  await updateDoc(ref, { [`categories.${cat}.${itemId}.checked`]: checked });
}

async function deleteItem(cat, itemId){
  const ref = doc(db, "lists", activeListId);
  await updateDoc(ref, { [`categories.${cat}.${itemId}`]: deleteField() });
}

async function addItemToCategory(cat, inputEl){
  const text = inputEl.value.trim();
  if(!text || !activeListId) return;
  const ref = doc(db, "lists", activeListId);
  const id = uid();
  draftInputs[cat] = "";
  inputEl.value = "";
  await updateDoc(ref, { [`categories.${cat}.${id}`]: { text, checked: false } });
  inputEl.focus();
}

async function renameCategory(oldName){
  if(!activeListData) return;
  const newName = prompt("Neuer Name für die Kategorie:", oldName);
  if(!newName || !newName.trim() || newName.trim() === oldName) return;
  const trimmed = newName.trim();
  if(activeListData.categories[trimmed]){ alert("Eine Kategorie mit diesem Namen gibt es schon."); return; }
  const ref = doc(db, "lists", activeListId);
  const updates = {};
  updates[`categories.${trimmed}`] = activeListData.categories[oldName] || {};
  updates[`categories.${oldName}`] = deleteField();
  updates.categoryOrder = currentOrder().map(c => c === oldName ? trimmed : c);
  await updateDoc(ref, updates);
}

async function deleteCategory(name){
  if(!activeListData) return;
  const count = Object.keys(activeListData.categories[name] || {}).length;
  const msg = count > 0
    ? `Kategorie "${name}" inkl. ${count} Artikel löschen?`
    : `Kategorie "${name}" löschen?`;
  if(!confirm(msg)) return;
  const ref = doc(db, "lists", activeListId);
  const updates = {};
  updates[`categories.${name}`] = deleteField();
  updates.categoryOrder = currentOrder().filter(c => c !== name);
  await updateDoc(ref, updates);
}

async function addCategory(){
  if(!activeListData) return;
  const name = prompt("Name der neuen Kategorie (z.B. „🎒 Sonstiges“):");
  if(!name || !name.trim()) return;
  const trimmed = name.trim();
  if(activeListData.categories[trimmed]){ alert("Eine Kategorie mit diesem Namen gibt es schon."); return; }
  const ref = doc(db, "lists", activeListId);
  const updates = {};
  updates[`categories.${trimmed}`] = {};
  updates.categoryOrder = [...currentOrder(), trimmed];
  await updateDoc(ref, updates);
}

async function moveCategory(name, direction){
  if(!activeListData) return;
  const order = [...currentOrder()];
  const idx = order.indexOf(name);
  const newIdx = idx + direction;
  if(idx === -1 || newIdx < 0 || newIdx >= order.length) return;
  [order[idx], order[newIdx]] = [order[newIdx], order[idx]];
  const ref = doc(db, "lists", activeListId);
  await updateDoc(ref, { categoryOrder: order });
}

function watchActiveList(id){
  if(unsubActiveList) unsubActiveList();
  activeListId = id;
  setListIdInUrl(id);
  unsubActiveList = onSnapshot(doc(db, "lists", id), (snap)=>{
    if(!snap.exists()){ activeListData = null; renderCategories(); return; }
    activeListData = snap.data();
    renderCategories();
    setStatus("Live verbunden – Änderungen werden sofort geteilt", true);
  }, (err)=>{
    console.error(err);
    setStatus("Verbindung unterbrochen: " + err.message, false);
  });
}

async function switchList(id){
  watchActiveList(id);
  renderListSelect();
}

listSelect.addEventListener("change", ()=> switchList(listSelect.value));

document.getElementById("newCategoryBtn").addEventListener("click", addCategory);

document.getElementById("copyLinkBtn").addEventListener("click", ()=>{
  shareLink.select();
  navigator.clipboard.writeText(shareLink.value).then(()=>{
    const btn = document.getElementById("copyLinkBtn");
    const old = btn.textContent;
    btn.textContent = "Kopiert ✓";
    setTimeout(()=> btn.textContent = old, 1500);
  }).catch(()=>{});
});

document.getElementById("newListBtn").addEventListener("click", async ()=>{
  const name = prompt("Name der neuen Liste (z.B. „Skiurlaub 2027“):");
  if(!name || !name.trim()) return;
  const cats = {};
  defaultCategoryOrder.forEach(c=> cats[c] = {});
  const ref = doc(listsCol);
  await setDoc(ref, { name: name.trim(), categoryOrder: defaultCategoryOrder, categories: cats, createdAt: serverTimestamp() });
  switchList(ref.id);
});

document.getElementById("renameListBtn").addEventListener("click", async ()=>{
  if(!activeListData) return;
  const name = prompt("Neuer Name für diese Liste:", activeListData.name);
  if(!name || !name.trim()) return;
  await updateDoc(doc(db, "lists", activeListId), { name: name.trim() });
});

document.getElementById("duplicateListBtn").addEventListener("click", async ()=>{
  if(!activeListData) return;
  const ref = doc(listsCol);
  await setDoc(ref, {
    name: activeListData.name + " (Kopie)",
    categoryOrder: activeListData.categoryOrder,
    categories: JSON.parse(JSON.stringify(activeListData.categories)),
    createdAt: serverTimestamp()
  });
  switchList(ref.id);
});

document.getElementById("deleteListBtn").addEventListener("click", async ()=>{
  const ids = Object.keys(allLists);
  if(ids.length <= 1){ alert("Das ist die einzige Liste — sie kann nicht gelöscht werden."); return; }
  if(!activeListData) return;
  if(!confirm(`Liste „${activeListData.name}“ wirklich für alle löschen?`)) return;
  const idToDelete = activeListId;
  const fallback = ids.find(i => i !== idToDelete);
  await switchList(fallback);
  await deleteDoc(doc(db, "lists", idToDelete));
});

document.getElementById("resetChecksBtn").addEventListener("click", async ()=>{
  if(!activeListData) return;
  if(!confirm("Alle Häkchen in dieser Liste für alle zurücksetzen?")) return;
  const updates = {};
  Object.entries(activeListData.categories || {}).forEach(([cat, items])=>{
    Object.keys(items).forEach(id=>{
      updates[`categories.${cat}.${id}.checked`] = false;
    });
  });
  if(Object.keys(updates).length){
    await updateDoc(doc(db, "lists", activeListId), updates);
  }
});

document.getElementById("printBtn").addEventListener("click", ()=> window.print());

async function init(){
  setStatus("Verbinde…", false);
  onSnapshot(query(listsCol, orderBy("createdAt","asc")), async (snap)=>{
    allLists = {};
    snap.forEach(d=> allLists[d.id] = d.data());

    if(Object.keys(allLists).length === 0){
      // First ever visitor: seed the default list
      const ref = doc(listsCol);
      await setDoc(ref, defaultSommerurlaub());
      return; // onSnapshot will fire again with the new list
    }

    renderListSelect();

    if(!activeListId){
      const urlId = getListIdFromUrl();
      const startId = (urlId && allLists[urlId]) ? urlId : Object.keys(allLists)[0];
      watchActiveList(startId);
    } else if(!allLists[activeListId]){
      // active list was deleted remotely
      watchActiveList(Object.keys(allLists)[0]);
    } else {
      renderListSelect();
    }
  }, (err)=>{
    console.error(err);
    setStatus("Verbindung fehlgeschlagen: " + err.message, false);
  });
}

init();
</script>
