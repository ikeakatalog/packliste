<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CheckCheck</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --scale: 1;
    --spring: cubic-bezier(0.34,1.56,0.64,1);
    --bg-0:#f5f5f7;
    --bg-wash-1: rgba(108,92,231,0.10);
    --bg-wash-2: rgba(255,122,89,0.09);
    --ink:#1d1d1f;
    --muted:#6e6e73;
    --muted-light:#9a9aa0;
    --accent:#6c5ce7;
    --accent-2:#5947d6;
    --done:#34c759;
    --danger:#ff3b30;
    --glass-bg: rgba(255,255,255,0.66);
    --glass-bg-strong: rgba(255,255,255,0.84);
    --glass-border: rgba(0,0,0,0.07);
    --glass-shadow: 0 10px 30px rgba(0,0,0,0.07), 0 2px 8px rgba(0,0,0,0.04);
    --field-bg: rgba(255,255,255,0.92);
    --btn-secondary-bg: rgba(0,0,0,0.045);
    --btn-secondary-bg-hover: rgba(0,0,0,0.08);
    --chip-bg: rgba(0,0,0,0.055);
    --divider: rgba(0,0,0,0.08);
    --page-bg:
      radial-gradient(circle at 12% 0%, var(--bg-wash-1), transparent 42%),
      radial-gradient(circle at 100% 25%, var(--bg-wash-2), transparent 40%),
      var(--bg-0);
  }
  html[data-theme="dark"]{
    --bg-0:#000000;
    --bg-wash-1: rgba(108,92,231,0.18);
    --bg-wash-2: rgba(255,122,89,0.12);
    --ink:#f5f5f7;
    --muted:#98989d;
    --muted-light:#77777c;
    --accent:#8b7cf6;
    --accent-2:#7566e8;
    --done:#32d74b;
    --danger:#ff453a;
    --glass-bg: rgba(28,28,30,0.66);
    --glass-bg-strong: rgba(30,30,32,0.88);
    --glass-border: rgba(255,255,255,0.09);
    --glass-shadow: 0 10px 30px rgba(0,0,0,0.55);
    --field-bg: rgba(255,255,255,0.07);
    --btn-secondary-bg: rgba(255,255,255,0.08);
    --btn-secondary-bg-hover: rgba(255,255,255,0.14);
    --chip-bg: rgba(255,255,255,0.08);
    --divider: rgba(255,255,255,0.09);
  }
  *{box-sizing:border-box;}
  html{font-size:calc(16px * var(--scale)); scroll-behavior:smooth;}
  body{
    margin:0;
    min-height:100vh;
    font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    color:var(--ink);
    padding:1.25rem 1rem 5rem;
    background:var(--page-bg);
    background-attachment: fixed;
    position:relative;
    transition:background .3s ease, color .3s ease;
  }
  .wrap{max-width:40rem;margin:0 auto;position:relative;z-index:1;}

  .glass{
    background:var(--glass-bg);
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    border:1px solid var(--glass-border);
    border-radius:1.3rem;
    box-shadow:var(--glass-shadow);
    transition:background .3s ease, border-color .3s ease;
  }

  header.glass{
    padding:1.2rem 1.3rem;
    margin-bottom:0.9rem;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:0.75rem;
    flex-wrap:wrap;
  }
  .title-block h1{
    font-family:'Outfit',sans-serif;
    font-size:1.55rem;
    font-weight:800;
    margin:0 0 0.15rem;
    letter-spacing:-0.02em;
    display:flex;align-items:center;gap:0.4rem;
  }
  .title-block h1 .brand{
    background:linear-gradient(100deg, var(--accent), var(--accent-2));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .sub{color:var(--muted);font-size:0.88rem;margin:0;}
  .status{font-size:0.76rem;color:var(--muted);margin-top:0.5rem;display:flex;align-items:center;gap:0.4rem;}
  .status .dot{width:0.45rem;height:0.45rem;border-radius:50%;background:var(--danger);flex-shrink:0;}
  .status.live .dot{background:var(--done);box-shadow:0 0 0 0 rgba(52,199,89,0.6);animation:pulse 2s infinite;}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(52,199,89,0.55);}
    70%{box-shadow:0 0 0 7px rgba(52,199,89,0);}
    100%{box-shadow:0 0 0 0 rgba(52,199,89,0);}
  }

  .header-controls{display:flex;align-items:center;gap:0.5rem;flex-shrink:0;}

  .theme-toggle{
    all:unset;
    width:2.3rem;height:2.3rem;
    display:flex;align-items:center;justify-content:center;
    border-radius:999px;
    background:var(--btn-secondary-bg);
    border:1px solid var(--glass-border);
    cursor:pointer;
    font-size:1rem;
    flex-shrink:0;
    transition:transform .15s var(--spring), background .15s ease;
  }
  .theme-toggle:active{transform:scale(0.9);}

  .fontctl{
    display:flex;align-items:center;gap:0.25rem;
    background:var(--btn-secondary-bg);
    border:1px solid var(--glass-border);
    border-radius:999px;
    padding:0.2rem;
    flex-shrink:0;
  }
  .fontctl button{
    all:unset;
    width:1.9rem;height:1.9rem;
    display:flex;align-items:center;justify-content:center;
    border-radius:999px;
    font-family:'Outfit',sans-serif;
    font-weight:700;
    color:var(--ink);
    cursor:pointer;
    font-size:1.02rem;
    line-height:1;
  }
  .fontctl button:active{background:rgba(108,92,231,0.22);}
  .fontctl-value{
    font-size:0.7rem;font-weight:600;color:var(--muted);
    min-width:2.3rem;text-align:center;cursor:pointer;
    user-select:none;
  }

  .floating-bar{
    position:fixed;
    top:0.7rem;
    left:50%;
    width:min(94%, 40rem);
    z-index:200;
    display:flex;
    align-items:center;
    gap:0.7rem;
    flex-wrap:wrap;
    padding:0.5rem 0.75rem;
    background:var(--glass-bg-strong);
    backdrop-filter: blur(22px) saturate(160%);
    -webkit-backdrop-filter: blur(22px) saturate(160%);
    border:1px solid var(--glass-border);
    border-radius:1.1rem;
    box-shadow:var(--glass-shadow);
    transform:translate(-50%, -140%);
    opacity:0;
    pointer-events:none;
    transition:transform .25s var(--spring), opacity .25s ease, background .3s ease;
  }
  .floating-bar.visible{
    transform:translate(-50%, 0);
    opacity:1;
    pointer-events:auto;
  }
  .floating-bar .progress-row{flex:1;min-width:8rem;display:flex;align-items:center;gap:0.6rem;}
  .floating-bar .progress-text{font-size:0.76rem;}
  .floating-bar .fontctl{background:var(--chip-bg);}

  .list-bar{
    display:flex;flex-wrap:wrap;gap:0.5rem;align-items:center;
    padding:0.75rem;margin:0.8rem 0;
  }
  select, input[type=text]{
    font-family:'Inter',sans-serif;
    font-size:0.94rem;padding:0.6rem 0.7rem;
    border:1px solid var(--glass-border);
    border-radius:0.8rem;
    background:var(--field-bg);
    color:var(--ink);
    min-height:2.5rem;
  }
  select:focus, input[type=text]:focus{ outline:2px solid var(--accent); outline-offset:1px;}
  select#listSelect{flex:1;min-width:8rem;}
  .list-bar-actions{display:flex;gap:0.4rem;flex-shrink:0;}

  button{
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:0.86rem;padding:0.62rem 1rem;border:none;border-radius:0.85rem;
    background:linear-gradient(135deg, var(--accent), var(--accent-2));
    color:#fff;cursor:pointer;
    min-height:2.5rem;
    box-shadow:0 4px 14px rgba(108,92,231,0.28);
    transition:transform .15s var(--spring), box-shadow .15s ease, background .2s ease;
  }
  button:hover{transform:translateY(-1px); box-shadow:0 6px 18px rgba(108,92,231,0.36);}
  button:active{transform:translateY(0) scale(0.97);}
  button.secondary{background:var(--btn-secondary-bg);color:var(--ink);box-shadow:none;border:1px solid var(--glass-border);}
  button.secondary:hover{background:var(--btn-secondary-bg-hover); box-shadow:none;}
  button.danger{background:linear-gradient(135deg, var(--danger), #d92c22); box-shadow:0 4px 14px rgba(255,59,48,0.3);}
  button.small{padding:0.45rem 0.8rem;min-height:2.1rem;font-size:0.8rem;}
  button.icon-btn{
    min-height:auto;width:2.2rem;height:2.2rem;padding:0;
    display:flex;align-items:center;justify-content:center;
    background:var(--btn-secondary-bg);color:var(--ink);box-shadow:none;
    border:1px solid var(--glass-border);font-size:0.9rem;flex-shrink:0;
  }
  button.icon-btn:hover{background:var(--btn-secondary-bg-hover);}
  button.icon-btn.danger{background:var(--btn-secondary-bg);color:var(--danger);box-shadow:none;}
  button.icon-btn.danger:hover{background:rgba(255,59,48,0.14);}
  button.icon-btn:disabled{opacity:0.3;}
  button:disabled{opacity:0.45;cursor:default;transform:none;}

  .share-row{
    display:flex;gap:0.5rem;align-items:center;margin:0.7rem 0;flex-wrap:wrap;
    padding:0.65rem 0.8rem;
  }
  .share-row input{flex:1;min-width:11rem;font-size:0.8rem;color:var(--muted);background:var(--field-bg);}

  .progress-card{padding:0.9rem 1rem;margin:0.8rem 0;}
  .progress-row{display:flex;align-items:center;gap:0.8rem;}
  .progress-bar{flex:1;height:0.65rem;background:var(--chip-bg);border-radius:999px;overflow:hidden;}
  .progress-fill{
    height:100%;
    background:linear-gradient(90deg, var(--accent), var(--done));
    width:0%;
    border-radius:999px;
    transition:width .35s var(--spring);
  }
  .progress-text{font-size:0.84rem;color:var(--muted);white-space:nowrap;font-weight:600;}
  .progress-actions{display:flex;align-items:center;justify-content:space-between;gap:0.5rem;margin-top:0.7rem;}
  .section-label{font-size:0.82rem;color:var(--muted);font-weight:600;}

  /* Category tree */
  .cat-node{margin-bottom:0;}
  .cat-node.cat-top{overflow:hidden;}
  .cat-node.cat-sub{
    margin:0.35rem 0;
    border-left:2px solid var(--cat-color, var(--divider));
    padding-left:0.65rem;
    border-radius:0.3rem;
  }

  .cat-header{display:flex;align-items:center;gap:0.45rem;padding:0.85rem 1rem;}
  .cat-node.cat-sub > .cat-header{padding:0.4rem 0.3rem;}

  .drag-handle{
    cursor:grab;color:var(--muted-light);opacity:0;transition:opacity .15s ease;
    flex-shrink:0;font-size:0.95rem;width:1.05rem;text-align:center;touch-action:none;
    user-select:none;
  }
  .cat-header:hover .drag-handle, .item-row:hover .drag-handle, .item-row:focus-within .drag-handle{opacity:1;}
  @media (hover:none){ .drag-handle{opacity:0.5;} }
  .drag-handle:active{cursor:grabbing;}

  .chevron-btn{
    all:unset;cursor:pointer;color:var(--muted);font-size:0.75rem;width:1.1rem;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    transition:transform .2s var(--spring);
  }
  .chevron-btn.collapsed{transform:rotate(-90deg);}

  .cat-name{
    all:unset;cursor:pointer;font-family:'Outfit',sans-serif;font-weight:600;
    font-size:1.01rem;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;
    white-space:nowrap;
  }
  .cat-node.cat-sub .cat-name{font-size:0.9rem;}

  .count-badge{
    font-size:0.7rem;font-weight:700;color:var(--muted);background:var(--chip-bg);
    padding:0.15rem 0.5rem;border-radius:999px;flex-shrink:0;
  }

  .kebab-btn{
    all:unset;cursor:pointer;width:1.8rem;height:1.8rem;border-radius:50%;
    display:flex;align-items:center;justify-content:center;color:var(--muted);
    flex-shrink:0;font-size:1.15rem;
  }
  .kebab-btn:hover{background:var(--chip-bg);color:var(--ink);}

  .mini-progress{height:0.3rem;background:var(--chip-bg);border-radius:999px;overflow:hidden;margin:0 1rem 0.65rem;}
  .cat-node.cat-sub > .mini-progress{margin:0 0.3rem 0.45rem;}
  .mini-progress-fill{
    height:100%;
    background:linear-gradient(90deg, var(--cat-color, var(--accent)), var(--done));
    border-radius:999px;
    transition:width .35s var(--spring);
  }

  .children-wrap.collapsed{display:none;}
  .children-list{display:flex;flex-direction:column;gap:0.3rem;padding:0 1rem 0.75rem 1.35rem;}
  .cat-node.cat-sub > .children-wrap > .children-list{padding:0 0.15rem 0.5rem 0.9rem;}
  .children-list.top-level{padding:0;gap:0.75rem;}
  .children-list.top-level:empty{
    display:flex;align-items:center;justify-content:center;text-align:center;
    color:var(--muted);font-size:0.88rem;padding:2.4rem 1.2rem;
  }
  .children-list.top-level:empty::before{content:'Noch keine Kategorien — leg los mit „+ Kategorie" oben.';}

  .item-row{display:flex;align-items:center;gap:0.6rem;padding:0.5rem 0.15rem;border-bottom:1px solid var(--divider);}
  .item-row.checked .item-text{text-decoration:line-through;color:var(--muted-light);}
  .item-text{flex:1;font-size:0.95rem;line-height:1.35;cursor:pointer;min-width:0;overflow-wrap:anywhere;}

  .item-row input[type=checkbox]{
    -webkit-appearance:none;appearance:none;
    width:1.3rem;height:1.3rem;flex-shrink:0;
    border-radius:0.42rem;
    border:1.7px solid var(--muted-light);
    cursor:pointer;
    display:grid;place-content:center;
    transition:background .15s var(--spring), border-color .15s ease, transform .1s ease;
  }
  .item-row input[type=checkbox]::before{
    content:"";
    width:0.72rem;height:0.72rem;
    clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 45% 68%);
    background:#fff;
    transform:scale(0);
    transition:transform .18s var(--spring);
  }
  .item-row input[type=checkbox]:checked{background:linear-gradient(135deg, var(--accent), var(--done));border-color:transparent;}
  .item-row input[type=checkbox]:checked::before{transform:scale(1);}
  .item-row input[type=checkbox]:active{transform:scale(0.88);}

  .empty-cat{color:var(--muted);font-size:0.83rem;padding:0.3rem 0 0.5rem;font-style:italic;}

  .add-row{display:flex;gap:0.5rem;align-items:center;margin-top:0.15rem;padding-top:0.5rem;border-top:1px dashed var(--divider);}
  .add-row input[type=text]{flex:1;background:transparent;border:none;padding:0.35rem 0.1rem;min-height:auto;font-size:0.9rem;}
  .add-row input[type=text]:focus{outline:none;}
  .add-row .add-btn{min-height:auto;width:1.9rem;height:1.9rem;padding:0;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.05rem;flex-shrink:0;}
  .add-subcat-ghost{all:unset;cursor:pointer;font-size:0.78rem;color:var(--muted);padding:0.3rem 0.15rem;margin-top:0.1rem;display:inline-block;}
  .add-subcat-ghost:hover{color:var(--accent);}

  .sortable-ghost{opacity:0.35;}
  .sortable-drag{box-shadow:0 10px 26px rgba(0,0,0,0.22);border-radius:0.7rem;}

  /* Sheets / modals */
  .sheet-overlay{
    position:fixed;inset:0;z-index:500;
    background:rgba(0,0,0,0.32);
    backdrop-filter:blur(4px);
    display:flex;align-items:flex-end;justify-content:center;
    opacity:0;pointer-events:none;
    transition:opacity .2s ease;
    padding:0.8rem;
  }
  .sheet-overlay.visible{opacity:1;pointer-events:auto;}
  .sheet{
    width:min(100%, 25rem);
    margin-bottom:0.6rem;
    background:var(--glass-bg-strong);
    backdrop-filter:blur(26px) saturate(160%);
    -webkit-backdrop-filter:blur(26px) saturate(160%);
    border:1px solid var(--glass-border);
    border-radius:1.3rem;
    box-shadow:0 24px 60px rgba(0,0,0,0.28);
    padding:1.25rem 1.25rem 1rem;
    transform:translateY(24px) scale(0.98);
    transition:transform .28s var(--spring);
  }
  .sheet-overlay.visible .sheet{transform:translateY(0) scale(1);}
  @media (min-width:30rem){
    .sheet-overlay{align-items:center;}
    .sheet{margin-bottom:0;}
  }
  .sheet-title{font-family:'Outfit',sans-serif;font-size:1.12rem;font-weight:700;margin:0 0 0.25rem;}
  .sheet-message{color:var(--muted);font-size:0.88rem;margin:0 0 0.85rem;line-height:1.45;}
  .sheet-field{margin-bottom:0.85rem;}
  .sheet-field label{display:block;font-size:0.76rem;color:var(--muted);margin-bottom:0.32rem;font-weight:600;}
  .sheet-field input[type=text]{width:100%;}
  .sheet-radio-group{display:flex;flex-direction:column;gap:0.4rem;}
  .sheet-radio{all:unset;box-sizing:border-box;cursor:pointer;padding:0.6rem 0.8rem;border-radius:0.8rem;border:1.5px solid var(--glass-border);font-size:0.88rem;}
  .sheet-radio.selected{border-color:var(--accent);background:rgba(108,92,231,0.12);font-weight:600;}
  .sheet-picker-list{display:flex;flex-direction:column;gap:0.2rem;max-height:15rem;overflow-y:auto;margin-bottom:0.85rem;}
  .sheet-picker-item{all:unset;box-sizing:border-box;cursor:pointer;padding:0.6rem 0.75rem;border-radius:0.7rem;font-size:0.88rem;white-space:pre;width:100%;display:block;}
  .sheet-picker-item:hover{background:var(--chip-bg);}
  .sheet-actions{display:flex;gap:0.55rem;justify-content:flex-end;margin-top:0.3rem;}
  .sheet-actions button{min-width:5.2rem;}

  /* Kebab context menu */
  .kebab-menu{
    position:fixed;z-index:550;min-width:11.5rem;
    background:var(--glass-bg-strong);
    backdrop-filter:blur(22px) saturate(160%);
    -webkit-backdrop-filter:blur(22px) saturate(160%);
    border:1px solid var(--glass-border);
    border-radius:0.9rem;
    box-shadow:0 14px 32px rgba(0,0,0,0.22);
    padding:0.35rem;
    opacity:0;transform:scale(0.95) translateY(-4px);
    transition:opacity .15s ease, transform .15s var(--spring);
  }
  .kebab-menu.visible{opacity:1;transform:scale(1) translateY(0);}
  .kebab-menu-item{
    all:unset;box-sizing:border-box;display:flex;align-items:center;gap:0.55rem;
    width:100%;padding:0.55rem 0.7rem;border-radius:0.6rem;font-size:0.86rem;cursor:pointer;
  }
  .kebab-menu-item:hover{background:var(--chip-bg);}
  .kebab-menu-item.danger{color:var(--danger);}
  .kmi-icon{width:1.05rem;text-align:center;flex-shrink:0;opacity:0.85;}

  /* Confetti */
  .confetti-piece{
    position:fixed;width:7px;height:7px;border-radius:2px;pointer-events:none;z-index:999;
    animation:confetti-fly .85s cubic-bezier(0.2,0.8,0.4,1) forwards;
  }
  @keyframes confetti-fly{
    0%{transform:translate(0,0) rotate(0deg);opacity:1;}
    100%{transform:translate(var(--dx),var(--dy)) rotate(var(--rot));opacity:0;}
  }

  .footer-actions{display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:1.2rem;}
  .hint{font-size:0.76rem;color:var(--muted);margin-top:0.6rem;text-align:center;}

  @media (max-width: 30rem){
    header.glass{flex-direction:column;}
    .header-controls{align-self:flex-end;}
    .list-bar{flex-direction:column;align-items:stretch;}
    .list-bar select{width:100%;}
    .list-bar-actions{justify-content:flex-end;}
  }

  @media print{
    .list-bar,.footer-actions,.share-row,.fontctl,.theme-toggle,.progress-actions,
    .drag-handle,.kebab-btn,.add-row,.add-subcat-ghost,.floating-bar,.sheet-overlay,.kebab-menu{display:none !important;}
    body{background:#fff;}
    .glass{background:#fff;box-shadow:none;backdrop-filter:none;border-color:#ddd;}
    .cat-node.cat-top{break-inside:avoid;border:1px solid #ddd;}
    .children-wrap.collapsed{display:block !important;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="glass">
    <div class="title-block">
      <h1>✅ <span class="brand">CheckCheck</span></h1>
      <p class="sub">Abhaken, organisieren, teilen — in Echtzeit für alle sichtbar.</p>
      <div class="status" id="statusLine"><span class="dot"></span><span class="statusText">Verbinde…</span></div>
    </div>
    <div class="header-controls">
      <button class="theme-toggle" id="themeToggle" aria-label="Darstellung umschalten">🌙</button>
      <div class="fontctl" title="Schriftgröße anpassen">
        <button class="js-font-smaller" aria-label="Schrift verkleinern">−</button>
        <span class="fontctl-value js-font-value" title="Zurücksetzen">100%</span>
        <button class="js-font-bigger" aria-label="Schrift vergrößern">+</button>
      </div>
    </div>
  </header>

  <div class="floating-bar" id="floatingBar">
    <div class="progress-row">
      <div class="progress-bar"><div class="progress-fill js-progress-fill"></div></div>
      <div class="progress-text js-progress-text">0 / 0</div>
    </div>
    <div class="fontctl" title="Schriftgröße anpassen">
      <button class="js-font-smaller" aria-label="Schrift verkleinern">−</button>

<script>
(function(){
  var root = document.documentElement;

  var SCALE_KEY = "packliste_fontscale";
  var MIN = 0.75, MAX = 1.8, STEP = 0.05;
  var scale = parseFloat(localStorage.getItem(SCALE_KEY)) || 1;
  function applyScale(){
    root.style.setProperty("--scale", scale.toFixed(2));
    document.querySelectorAll(".js-font-value").forEach(function(el){
      el.textContent = Math.round(scale * 100) + "%";
    });
  }
  applyScale();
  document.querySelectorAll(".js-font-smaller").forEach(function(btn){
    btn.addEventListener("click", function(){
      scale = Math.max(MIN, +(scale - STEP).toFixed(2));
      localStorage.setItem(SCALE_KEY, scale); applyScale();
    });
  });
  document.querySelectorAll(".js-font-bigger").forEach(function(btn){
    btn.addEventListener("click", function(){
      scale = Math.min(MAX, +(scale + STEP).toFixed(2));
      localStorage.setItem(SCALE_KEY, scale); applyScale();
    });
  });
  document.querySelectorAll(".js-font-value").forEach(function(el){
    el.addEventListener("click", function(){
      scale = 1; localStorage.setItem(SCALE_KEY, scale); applyScale();
    });
  });

  var headerEl = document.querySelector("header.glass");
  var floatingBar = document.getElementById("floatingBar");
  if(headerEl && floatingBar && "IntersectionObserver" in window){
    var io = new IntersectionObserver(function(entries){
      entries.forEach(function(entry){
        floatingBar.classList.toggle("visible", !entry.isIntersecting);
      });
    }, { threshold: 0 });
    io.observe(headerEl);
  }

  var THEME_KEY = "packliste_theme";
  var stored = localStorage.getItem(THEME_KEY);
  var theme = stored || (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
  var themeBtn = document.getElementById("themeToggle");
  function applyTheme(){
    if(theme === "dark"){
      root.setAttribute("data-theme", "dark");
      themeBtn.textContent = "☀️";
    } else {
      root.removeAttribute("data-theme");
      themeBtn.textContent = "🌙";
    }
  }
  applyTheme();
  themeBtn.addEventListener("click", function(){
    theme = theme === "dark" ? "light" : "dark";
    localStorage.setItem(THEME_KEY, theme);
    applyTheme();
  });
})();
</script>

// ---------- Migration from the old flat categories-map format ----------
function isOldFormat(data){

function migrateListData(data){
  const nodes = {};
  const childOrder = { root: [] };
  const order = data.categoryOrder || Object.keys(data.categories || {});
  order.forEach(catName=>{
    if(!data.categories || !(catName in data.categories)) return;
    const catId = newId("c");
    nodes[catId] = { type:"category", name: catName, parentId:"root" };
    childOrder.root.push(catId);
    const items = data.categories[catName] || {};
    const itemIds = [];
    Object.values(items).forEach(item=>{
      const itemId = newId("i");
      nodes[itemId] = { type:"item", text: item.text, checked: !!item.checked, parentId: catId };
      itemIds.push(itemId);
    });
    childOrder[catId] = itemIds;
  });
  return {
    name: data.name || "(ohne Namen)",
    nodes, childOrder,

}

function docRef(){ return doc(db, "lists", activeListId); }
function getNodes(){ return (activeListData && activeListData.nodes) || {}; }
function getChildOrderMap(){ return (activeListData && activeListData.childOrder) || {}; }
function childrenOf(parentId){
  const order = getChildOrderMap()[parentId] || [];
  const nodes = getNodes();
  return order.filter(id => nodes[id]);
}

function computeProgress(nodeId){
  const nodes = getNodes();
  let done = 0, total = 0;
  childrenOf(nodeId).forEach(id=>{
    const n = nodes[id];
    if(!n) return;
    if(n.type === "item"){
      total++; if(n.checked) done++;
    } else {
      const sub = computeProgress(id);
      done += sub.done; total += sub.total;
    }
  });
  return { done, total };
}

function collectSubtree(nodeId){
  const result = [nodeId];
  childrenOf(nodeId).forEach(id => result.push(...collectSubtree(id)));
  return result;
}

function wouldCreateCycle(draggedId, targetParentId){
  if(targetParentId === draggedId) return true;
  const nodes = getNodes();
  let cur = targetParentId;
  let guard = 0;
  while(cur && cur !== "root" && guard++ < 500){
    const n = nodes[cur];
    if(!n || !n.parentId) break;
    if(n.parentId === draggedId) return true;
    cur = n.parentId;
  }
  return false;
}

// ---------- Mutations ----------
async function setChecked(itemId, checked){
  await updateDoc(docRef(), { [`nodes.${itemId}.checked`]: checked });
}
async function renameNode(nodeId, newValue, isCategory){
  const field = isCategory ? "name" : "text";
  await updateDoc(docRef(), { [`nodes.${nodeId}.${field}`]: newValue });
}
async function addItem(parentId, text){
  const order = [...childrenOf(parentId), null];
  const id = newId("i");
  order[order.length-1] = id;
  await updateDoc(docRef(), {
    [`nodes.${id}`]: { type:"item", text, checked:false, parentId },
    [`childOrder.${parentId}`]: order
  });
  return id;
}
async function addCategory(parentId, name){
  const id = newId("c");
  const order = [...childrenOf(parentId), id];
  const updates = {
    [`nodes.${id}`]: { type:"category", name, parentId },
    [`childOrder.${parentId}`]: order,
    [`childOrder.${id}`]: []
  };
  await updateDoc(docRef(), updates);
  return id;
}
async function deleteNode(nodeId){
  const nodes = getNodes();
  const parentId = nodes[nodeId] ? nodes[nodeId].parentId : null;
  const toDelete = collectSubtree(nodeId);
  const updates = {};
  toDelete.forEach(id=>{
    updates[`nodes.${id}`] = deleteField();
    updates[`childOrder.${id}`] = deleteField();
  });
  if(parentId){
    updates[`childOrder.${parentId}`] = childrenOf(parentId).filter(id => id !== nodeId);
  }
  await updateDoc(docRef(), updates);
}
async function moveNode(nodeId, fromParentId, toParentId, newIndex){
  if(fromParentId === toParentId){
    const order = childrenOf(fromParentId).filter(id => id !== nodeId);
    order.splice(newIndex, 0, nodeId);
    await updateDoc(docRef(), { [`childOrder.${fromParentId}`]: order });
  } else {
    const fromOrder = childrenOf(fromParentId).filter(id => id !== nodeId);
    const toOrder = childrenOf(toParentId).filter(id => id !== nodeId);
    toOrder.splice(newIndex, 0, nodeId);
    await updateDoc(docRef(), {
      [`childOrder.${fromParentId}`]: fromOrder,
      [`childOrder.${toParentId}`]: toOrder,
      [`nodes.${nodeId}.parentId`]: toParentId
    });
  }
}
async function duplicateNode(nodeId){
  const nodes = getNodes();
  const original = nodes[nodeId];
  if(!original) return;
  const parentId = original.parentId;
  const updates = {};
  function recurse(id, newParentId, isTop){
    const n = nodes[id];
    const nid = newId(n.type === "category" ? "c" : "i");
    const cloned = Object.assign({}, n, { parentId: newParentId });
    if(isTop && n.type === "category") cloned.name = n.name + " (Kopie)";
    updates[`nodes.${nid}`] = cloned;
    const kids = childrenOf(id);
    const newKidIds = kids.map(k => recurse(k, nid, false));
    if(n.type === "category") updates[`childOrder.${nid}`] = newKidIds;
    return nid;
  }
  const newRootId = recurse(nodeId, parentId, true);
  const order = childrenOf(parentId);
  const idx = order.indexOf(nodeId);
  const newOrder = [...order];
  newOrder.splice(idx+1, 0, newRootId);
  updates[`childOrder.${parentId}`] = newOrder;
  await updateDoc(docRef(), updates);
}

function buildSheetShell(title, message){

  if(message){

    p.className = "sheet-message"; p.textContent = message;
    sheet.appendChild(p);
  }
  overlay.appendChild(sheet);
  return { overlay, sheet };
}

function showTextSheet({ title, label, value="", placeholder="", confirmLabel="Speichern" }){
  return new Promise(resolve=>{
    const { overlay, sheet } = buildSheetShell(title);
    const field = document.createElement("div");
    field.className = "sheet-field";
    if(label){ const l = document.createElement("label"); l.textContent = label; field.appendChild(l); }
    const input = document.createElement("input");
    input.type = "text"; input.value = value; input.placeholder = placeholder;
    field.appendChild(input);
    sheet.appendChild(field);

    const actions = document.createElement("div");
    actions.className = "sheet-actions";
    const cancelBtn = document.createElement("button");
    cancelBtn.className = "secondary"; cancelBtn.textContent = "Abbrechen"; cancelBtn.type = "button";
    const okBtn = document.createElement("button");
    okBtn.textContent = confirmLabel; okBtn.type = "button";
    actions.append(cancelBtn, okBtn);
    sheet.appendChild(actions);

    function finish(result){
      overlay.classList.remove("visible");
      document.removeEventListener("keydown", onKey);
      setTimeout(()=> overlay.remove(), 200);
      resolve(result);
    }
    function submit(){
      const v = input.value.trim();
      if(!v){ input.focus(); return; }
      finish(v);
    }
    function onKey(e){
      if(e.key === "Escape"){ e.preventDefault(); finish(null); }
      if(e.key === "Enter"){ e.preventDefault(); submit(); }
    }
    cancelBtn.addEventListener("click", ()=> finish(null));
    okBtn.addEventListener("click", submit);
    overlay.addEventListener("click", e=>{ if(e.target === overlay) finish(null); });
    document.addEventListener("keydown", onKey);

    document.body.appendChild(overlay);
    requestAnimationFrame(()=>{ overlay.classList.add("visible"); input.focus(); input.select(); });
  });
}

    btn.className = "kebab-menu-item" + (it.danger ? " danger" : "");
    const iconSpan = document.createElement("span");
    iconSpan.className = "kmi-icon"; iconSpan.textContent = it.icon || "";
    const labelSpan = document.createElement("span");
    labelSpan.textContent = it.label;
    btn.append(iconSpan, labelSpan);
    btn.addEventListener("click", ()=>{ closeAnyMenu(); it.action(); });
    menu.appendChild(btn);
  });
  document.body.appendChild(menu);
  const r = anchor.getBoundingClientRect();
  const menuRect = menu.getBoundingClientRect();
  let top = r.bottom + 6;
  let left = r.right - menuRect.width;
  if(left < 8) left = 8;
  if(top + menuRect.height > window.innerHeight - 8) top = r.top - menuRect.height - 6;
  menu.style.top = top + "px";
  menu.style.left = left + "px";
  requestAnimationFrame(()=> menu.classList.add("visible"));
  setTimeout(()=> document.addEventListener("click", closeAnyMenu, true), 0);
}

// ---------- Confetti ----------
function burstConfetti(x, y){
  for(let i=0;i<16;i++){
    const el = document.createElement("div");
    el.className = "confetti-piece";
    el.style.left = x + "px"; el.style.top = y + "px";
    el.style.background = PALETTE[i % PALETTE.length];
    const angle = Math.random() * Math.PI * 2;
    const dist = 55 + Math.random() * 85;
    el.style.setProperty("--dx", Math.cos(angle) * dist + "px");
    el.style.setProperty("--dy", (Math.sin(angle) * dist - 35) + "px");
    el.style.setProperty("--rot", (Math.random() * 720 - 360) + "deg");
    document.body.appendChild(el);
    el.addEventListener("animationend", ()=> el.remove());
  }
}

// ---------- Flows ----------
async function addCategoryFlow(parentId){
  const name = await showTextSheet({
    title: parentId === "root" ? "Neue Kategorie" : "Neue Unterkategorie",
    label: "Name", placeholder: "z. B. 🎒 Sonstiges", confirmLabel: "Erstellen"
  });
  if(!name) return;
  await addCategory(parentId, name);
}
async function renameNodeFlow(id, currentValue, isCategory){
  const result = await showTextSheet({
    title: isCategory ? "Kategorie umbenennen" : "Eintrag umbenennen",
    label: "Name", value: currentValue, confirmLabel: "Speichern"
  });
  if(!result || result === currentValue) return;
  await renameNode(id, result, isCategory);
}
async function deleteNodeFlow(id, isCategory, name){
  const kidsCount = isCategory ? collectSubtree(id).length - 1 : 0;
  const msg = isCategory && kidsCount > 0
    ? `„${name}" inkl. ${kidsCount} Eintrag/Einträge löschen?`
    : `„${name}" löschen?`;
  const ok = await showConfirmSheet({
    title: isCategory ? "Kategorie löschen" : "Eintrag löschen",
    message: msg, confirmLabel: "Löschen", danger: true
  });
  if(!ok) return;
  await deleteNode(id);
  celebrated.delete(id);
}
function collectCategoryOptions(excludeIds){
  const nodes = getNodes();
  const options = [];
  function walk(parentId, depth){
    childrenOf(parentId).forEach(id=>{
      const n = nodes[id];
      if(!n || n.type !== "category") return;
      if(!excludeIds.has(id)){
        options.push({ id, label: "　".repeat(depth) + n.name, depth });
      }
      walk(id, depth+1);
    });
  }
  walk("root", 0);
  return options;
}
async function moveNodeFlow(id, isCategory){
  const nodes = getNodes();
  const n = nodes[id];
  if(!n) return;
  const exclude = new Set(isCategory ? collectSubtree(id) : []);
  const catOptions = collectCategoryOptions(exclude);
  const choices = isCategory ? [{ id:"root", label:"📥 Oberste Ebene" }, ...catOptions] : catOptions;
  if(choices.length === 0){
    await showConfirmSheet({ title:"Keine Ziele verfügbar", message:"Es gibt keine passende Kategorie zum Verschieben.", confirmLabel:"OK", hideCancel:true });
    return;
  }
  const targetId = await showPickerSheet({ title:"Verschieben nach…", options: choices });
  if(!targetId || targetId === n.parentId) return;
  const toOrder = childrenOf(targetId);
  await moveNode(id, n.parentId, targetId, toOrder.length);
}
function openCategoryMenu(id, n, anchor){
  showMenu(anchor, [
    { label:"Umbenennen", icon:"✎", action: ()=> renameNodeFlow(id, n.name, true) },
    { label:"Unterkategorie hinzufügen", icon:"➕", action: ()=> addCategoryFlow(id) },
    { label:"Verschieben nach…", icon:"↪", action: ()=> moveNodeFlow(id, true) },
    { label:"Duplizieren", icon:"⧉", action: ()=> duplicateNode(id) },
    { label:"Löschen", icon:"🗑", danger:true, action: ()=> deleteNodeFlow(id, true, n.name) }
  ]);
}
function openItemMenu(id, n, anchor){
  showMenu(anchor, [
    { label:"Umbenennen", icon:"✎", action: ()=> renameNodeFlow(id, n.text, false) },
    { label:"Verschieben nach…", icon:"↪", action: ()=> moveNodeFlow(id, false) },
    { label:"Duplizieren", icon:"⧉", action: ()=> duplicateNode(id) },
    { label:"Löschen", icon:"🗑", danger:true, action: ()=> deleteNodeFlow(id, false, n.text) }
  ]);
}

// ---------- Rendering ----------
function destroySortables(){
  sortables.forEach(s=>{ try{ s.destroy(); }catch(e){} });
  sortables = [];
}
function sortableOptions(){
  return {
    group: "tree",
    handle: ".drag-handle",
    animation: 180,
    ghostClass: "sortable-ghost",
    dragClass: "sortable-drag",
    onMove: function(evt){
      const draggedId = evt.dragged.dataset.nodeId;
      const draggedNode = getNodes()[draggedId];
      const draggedType = draggedNode && draggedNode.type;
      const targetParentId = evt.to.dataset.parentId;
      if(targetParentId === "root" && draggedType === "item") return false;
      if(draggedType === "category" && wouldCreateCycle(draggedId, targetParentId)) return false;
      return true;
    },
    onEnd: function(evt){
      const nodeId = evt.item.dataset.nodeId;
      const fromParentId = evt.from.dataset.parentId;
      const toParentId = evt.to.dataset.parentId;
      if(!nodeId || fromParentId == null || toParentId == null) return;
      moveNode(nodeId, fromParentId, toParentId, evt.newIndex).catch(err=> console.error(err));
    }
  };
}

function buildItemRow(id, n){
  const row = document.createElement("div");
  row.className = "item-row" + (n.checked ? " checked" : "");
  row.dataset.nodeId = id;

  const handle = document.createElement("span");
  handle.className = "drag-handle"; handle.textContent = "⠿"; handle.setAttribute("aria-hidden","true");

  const cb = document.createElement("input");
  cb.type = "checkbox"; cb.checked = !!n.checked;
  cb.addEventListener("change", ()=> setChecked(id, cb.checked));

  const span = document.createElement("span");
  span.className = "item-text";
  span.textContent = n.text;
  span.title = "Doppelklick zum Umbenennen";
  span.addEventListener("dblclick", ()=> renameNodeFlow(id, n.text, false));

  const kebab = document.createElement("button");
  kebab.className = "kebab-btn"; kebab.type = "button"; kebab.textContent = "⋯";
  kebab.setAttribute("aria-label", "Mehr Optionen");
  kebab.addEventListener("click", (e)=>{ e.stopPropagation(); openItemMenu(id, n, kebab); });

  row.append(handle, cb, span, kebab);
  return row;
}

function buildAddItemRow(parentId){
  const addRow = document.createElement("div");
  addRow.className = "add-row";
  const input = document.createElement("input");
  input.type = "text";
  input.placeholder = "Eintrag hinzufügen…";
  input.dataset.addInputFor = parentId;
  input.value = draftInputs[parentId] || "";
  input.addEventListener("input", ()=> { draftInputs[parentId] = input.value; });
  const btn = document.createElement("button");
  btn.className = "add-btn"; btn.type = "button"; btn.textContent = "+"; btn.title = "Hinzufügen";
  function submit(){
    const text = input.value.trim();
    if(!text) return;
    draftInputs[parentId] = "";
    input.value = "";
    addItem(parentId, text).then(()=> input.focus());
  }
  input.addEventListener("keydown", e=>{ if(e.key === "Enter") submit(); });
  btn.addEventListener("click", submit);
  addRow.append(input, btn);
  return addRow;
}

function buildAddSubcatGhost(parentId){
  const btn = document.createElement("button");
  btn.className = "add-subcat-ghost"; btn.type = "button";
  btn.textContent = "+ Unterkategorie";
  btn.addEventListener("click", ()=> addCategoryFlow(parentId));
  return btn;
}

function fillChildrenContainer(container, parentId, depth){
  const nodes = getNodes();
  childrenOf(parentId).forEach(id=>{
    const n = nodes[id];
    if(!n) return;
    if(n.type === "item"){
      container.appendChild(buildItemRow(id, n));
    } else {
      container.appendChild(buildCategoryNode(id, n, depth));
    }
  });
  if(depth > 0){
    container.appendChild(buildAddItemRow(parentId));
    container.appendChild(buildAddSubcatGhost(parentId));
  }
  const sortable = new Sortable(container, sortableOptions());
  sortables.push(sortable);
}

function buildChildrenContainer(parentId, depth){
  const container = document.createElement("div");
  container.className = "children-list";
  container.dataset.parentId = parentId;
  fillChildrenContainer(container, parentId, depth);
  return container;
}

function buildCategoryNode(id, n, depth){
  const progress = computeProgress(id);
  const isCollapsed = collapsedSet.has(id);

  const wrap = document.createElement("div");
  wrap.className = "cat-node " + (depth === 0 ? "cat-top glass" : "cat-sub");
  wrap.dataset.nodeId = id;
  wrap.style.setProperty("--cat-color", colorForId(id));

  const header = document.createElement("div");
  header.className = "cat-header";

  const handle = document.createElement("span");
  handle.className = "drag-handle"; handle.textContent = "⠿"; handle.setAttribute("aria-hidden","true");

  const chevron = document.createElement("button");
  chevron.type = "button";
  chevron.className = "chevron-btn" + (isCollapsed ? " collapsed" : "");
  chevron.textContent = "▾";
  chevron.setAttribute("aria-label", "Ein-/ausklappen");
  chevron.addEventListener("click", ()=> toggleCollapsed(id));

  const nameBtn = document.createElement("button");
  nameBtn.type = "button";
  nameBtn.className = "cat-name";
  nameBtn.textContent = n.name;
  nameBtn.title = "Umbenennen";
  nameBtn.addEventListener("click", ()=> renameNodeFlow(id, n.name, true));

  const count = document.createElement("span");
  count.className = "count-badge";
  count.textContent = `${progress.done}/${progress.total}`;

  const kebab = document.createElement("button");
  kebab.type = "button";
  kebab.className = "kebab-btn"; kebab.textContent = "⋯";
  kebab.setAttribute("aria-label", "Mehr Optionen");
  kebab.addEventListener("click", (e)=>{ e.stopPropagation(); openCategoryMenu(id, n, kebab); });

  header.append(handle, chevron, nameBtn, count, kebab);
  wrap.appendChild(header);

  const miniBar = document.createElement("div");
  miniBar.className = "mini-progress";
  const miniFill = document.createElement("div");
  miniFill.className = "mini-progress-fill";
  miniFill.style.width = progress.total ? (progress.done/progress.total*100)+"%" : "0%";
  miniBar.appendChild(miniFill);
  wrap.appendChild(miniBar);

  const childrenWrap = document.createElement("div");
  childrenWrap.className = "children-wrap" + (isCollapsed ? " collapsed" : "");
  childrenWrap.appendChild(buildChildrenContainer(id, depth + 1));
  wrap.appendChild(childrenWrap);

  if(progress.total > 0 && progress.done === progress.total){
    pendingCelebrations.push(id);
  } else {
    celebrated.delete(id);
  }

  return wrap;
}

function renderTree(){
  let focusedParent = null, focusedSelStart = null;
  const active = document.activeElement;
  if(active && active.dataset && active.dataset.addInputFor){
    focusedParent = active.dataset.addInputFor;
    focusedSelStart = active.selectionStart;
  }

  destroySortables();
  categoriesEl.innerHTML = "";

  if(!activeListData){ setProgress(0, 0); return; }
  if(!activeListData.nodes) activeListData.nodes = {};
  if(!activeListData.childOrder) activeListData.childOrder = {};
  if(!activeListData.childOrder.root) activeListData.childOrder.root = [];

  pendingCelebrations = [];

  categoriesEl.className = "children-list top-level";
  categoriesEl.dataset.parentId = "root";
  fillChildrenContainer(categoriesEl, "root", 0);

  const rootProgress = computeProgress("root");
  setProgress(rootProgress.done, rootProgress.total);
  if(rootProgress.total > 0 && rootProgress.done === rootProgress.total){
    pendingCelebrations.push("root");
  } else {
    celebrated.delete("root");
  }

  if(focusedParent){
    const el = categoriesEl.querySelector(`[data-add-input-for="${CSS.escape(focusedParent)}"]`);
    if(el){
      el.focus();
      if(focusedSelStart != null){
        try{ el.setSelectionRange(focusedSelStart, focusedSelStart); }catch(e){}
      }
    }
  }

  requestAnimationFrame(()=>{
    pendingCelebrations.forEach(id=>{
      if(celebrated.has(id)) return;
      celebrated.add(id);
      const el = id === "root"
        ? document.querySelector(".progress-card .progress-bar")
        : categoriesEl.querySelector(`[data-node-id="${CSS.escape(id)}"] > .mini-progress`);
      if(el){
        const r = el.getBoundingClientRect();
        burstConfetti(r.left + r.width/2, r.top + r.height/2);
      }
    });
  });
}

// ---------- List lifecycle ----------
function watchActiveList(id){
  if(unsubActiveList) unsubActiveList();
  activeListId = id;
  celebrated = new Set();
  loadCollapsed(id);
  setListIdInUrl(id);
  unsubActiveList = onSnapshot(doc(db, "lists", id), async (snap)=>{
    if(!snap.exists()){ activeListData = null; renderTree(); return; }
    const data = snap.data();
    if(isOldFormat(data)){
      const migrated = migrateListData(data);
      await setDoc(doc(db, "lists", id), migrated);
      return;
    }
    activeListData = data;
    renderTree();
    setStatus("Live verbunden – Änderungen werden sofort geteilt", true);
  }, (err)=>{
    console.error(err);
    setStatus("Verbindung unterbrochen: " + err.message, false);
  });
}

async function switchList(id){
  watchActiveList(id);
  renderListSelect();
}

listSelect.addEventListener("change", ()=> switchList(listSelect.value));

document.getElementById("newCategoryBtn").addEventListener("click", ()=> addCategoryFlow("root"));

document.getElementById("copyLinkBtn").addEventListener("click", ()=>{
  shareLink.select();
  navigator.clipboard.writeText(shareLink.value).then(()=>{
    const btn = document.getElementById("copyLinkBtn");
    const old = btn.textContent;
    btn.textContent = "Kopiert ✓";
    setTimeout(()=> btn.textContent = old, 1500);
  }).catch(()=>{});
});

document.getElementById("newListBtn").addEventListener("click", async ()=>{
  const result = await showNewListSheet();
  if(!result) return;
  const data = result.template === "travel" ? defaultSommerurlaub() : blankList(result.name);
  data.name = result.name;
  const ref = doc(listsCol);
  await setDoc(ref, data);
  switchList(ref.id);
});

document.getElementById("renameListBtn").addEventListener("click", async ()=>{
  if(!activeListData) return;
  const name = await showTextSheet({ title:"Liste umbenennen", label:"Name", value: activeListData.name, confirmLabel:"Speichern" });
  if(!name || name === activeListData.name) return;
  await updateDoc(doc(db, "lists", activeListId), { name });
});

document.getElementById("duplicateListBtn").addEventListener("click", async ()=>{
  if(!activeListData) return;
  const ref = doc(listsCol);
  await setDoc(ref, {
    name: activeListData.name + " (Kopie)",
    nodes: JSON.parse(JSON.stringify(activeListData.nodes || {})),
    childOrder: JSON.parse(JSON.stringify(activeListData.childOrder || { root: [] })),
    createdAt: serverTimestamp()
  });
  switchList(ref.id);
});

document.getElementById("deleteListBtn").addEventListener("click", async ()=>{
  const ids = Object.keys(allLists);
  if(ids.length <= 1){
    await showConfirmSheet({ title:"Nicht möglich", message:"Das ist die einzige Liste — sie kann nicht gelöscht werden.", confirmLabel:"OK", hideCancel:true });
    return;
  }
  if(!activeListData) return;
  const ok = await showConfirmSheet({ title:"Liste löschen", message:`Liste „${activeListData.name}" wirklich für alle löschen?`, confirmLabel:"Löschen", danger:true });
  if(!ok) return;
  const idToDelete = activeListId;
  const fallback = ids.find(i => i !== idToDelete);
  await switchList(fallback);
  await deleteDoc(doc(db, "lists", idToDelete));
});

document.getElementById("resetChecksBtn").addEventListener("click", async ()=>{
  if(!activeListData) return;
  const ok = await showConfirmSheet({ title:"Zurücksetzen", message:"Alle Häkchen in dieser Liste für alle zurücksetzen?", confirmLabel:"Zurücksetzen", danger:true });
  if(!ok) return;
  const updates = {};
  Object.entries(activeListData.nodes || {}).forEach(([id, n])=>{
    if(n.type === "item" && n.checked) updates[`nodes.${id}.checked`] = false;
  });
  if(Object.keys(updates).length){
    await updateDoc(doc(db, "lists", activeListId), updates);
  }
  celebrated.clear();
});

document.getElementById("printBtn").addEventListener("click", ()=> window.print());

async function init(){
  setStatus("Verbinde…", false);
  onSnapshot(query(listsCol, orderBy("createdAt","asc")), async (snap)=>{
    allLists = {};
    snap.forEach(d=> allLists[d.id] = d.data());

    if(Object.keys(allLists).length === 0){
      const ref = doc(listsCol);
      await setDoc(ref, defaultSommerurlaub());
      return;
    }

    renderListSelect();

    if(!activeListId){
      const urlId = getListIdFromUrl();
      const startId = (urlId && allLists[urlId]) ? urlId : Object.keys(allLists)[0];
      watchActiveList(startId);
    } else if(!allLists[activeListId]){
      watchActiveList(Object.keys(allLists)[0]);
    } else {
      renderListSelect();
    }
  }, (err)=>{
    console.error(err);
    setStatus("Verbindung fehlgeschlagen: " + err.message, false);
  });
}

init();
</script>
